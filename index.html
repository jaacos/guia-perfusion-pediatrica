    <style>
        /* ===== RESET & BASE ===== */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:        #0f172a;
            --surface:   #1e293b;
            --surface2:  #273549;
            --border:    #334155;
            --text:      #f1f5f9;
            --text-muted:#94a3b8;
            --accent:    #38bdf8;
            --ok-bg:     rgba(34,197,94,0.12);
            --ok-border: #22c55e;
            --warn-bg:   rgba(245,158,11,0.12);
            --warn-border:#f59e0b;
            --danger-bg: rgba(239,68,68,0.12);
            --danger-border:#ef4444;
            --neutral-bg:  #273549;
            --neutral-border:#334155;
            --radius:    14px;
            --radius-sm: 8px;
        }

        html, body {
            min-height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            font-size: 16px;
            line-height: 1.5;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1.5rem 1rem 2.5rem;
        }

        /* ===== LAYOUT ===== */
        .app {
            width: 100%;
            max-width: 440px;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        /* ===== HEADER ===== */
        header { text-align: center; padding: 0.5rem 0; }

        header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: var(--text);
        }

        header h1 span { color: var(--accent); }

        header p {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 0.25rem;
        }

        /* ===== CARD ===== */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
        }

        /* ===== FIELDS ===== */
        .field { margin-bottom: 1.1rem; }
        .field:last-child { margin-bottom: 0; }

        label {
            display: block;
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            color: var(--text-muted);
            margin-bottom: 0.45rem;
        }

        .input-wrap { position: relative; display: flex; align-items: center; }

        input[type="number"],
        input[type="text"] {
            width: 100%;
            background: var(--surface2);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-size: 1rem;
            padding: 0.7rem 4.5rem 0.7rem 0.9rem;
            outline: none;
            transition: border-color 0.2s;
            -webkit-appearance: none;
        }

        input[type="number"]:focus,
        input[type="text"]:focus { border-color: var(--accent); }

        input::placeholder { color: var(--text-muted); }

        input:disabled { opacity: 0.4; cursor: not-allowed; }

        .unit-badge {
            position: absolute;
            right: 0.75rem;
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--text-muted);
            pointer-events: none;
            white-space: nowrap;
            max-width: 4rem;
            text-align: right;
        }

        /* ===== AUTOCOMPLETE ===== */
        .autocomplete-wrap { position: relative; }

        #drug-suggestions {
            display: none;
            position: absolute;
            top: calc(100% + 4px);
            left: 0; right: 0;
            background: var(--surface2);
            border: 1.5px solid var(--accent);
            border-radius: var(--radius-sm);
            max-height: 220px;
            overflow-y: auto;
            z-index: 100;
            box-shadow: 0 8px 24px rgba(0,0,0,0.55);
        }

        #drug-suggestions.open { display: block; }

        .suggestion-item {
            padding: 0.6rem 0.9rem;
            cursor: pointer;
            font-size: 0.92rem;
            border-bottom: 1px solid var(--border);
            transition: background 0.12s;
        }

        .suggestion-item:last-child { border-bottom: none; }

        .suggestion-item:hover { background: var(--border); }

        .suggestion-trade {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-left: 0.4rem;
        }

        /* ===== DIVIDER ===== */
        hr {
            border: none;
            border-top: 1px solid var(--border);
            margin: 1.25rem 0;
        }

        /* ===== RESULT ===== */
        #result-box {
            border-radius: var(--radius-sm);
            padding: 1.25rem 1rem;
            text-align: center;
            transition: background 0.25s, border-color 0.25s;
            background: var(--neutral-bg);
            border: 1.5px solid var(--neutral-border);
        }

        #result-box.ok      { background: var(--ok-bg);     border-color: var(--ok-border); }
        #result-box.warn    { background: var(--warn-bg);   border-color: var(--warn-border); }
        #result-box.danger  { background: var(--danger-bg); border-color: var(--danger-border); }

        .result-label {
            font-size: 0.68rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.09em;
            color: var(--text-muted);
            margin-bottom: 0.35rem;
        }

        .result-value {
            font-size: 3rem;
            font-weight: 800;
            line-height: 1;
            color: var(--text);
            letter-spacing: -0.03em;
        }

        .result-unit {
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--text-muted);
            margin-left: 0.3rem;
        }

        #range-alert {
            display: none;
            margin-top: 0.6rem;
            font-size: 0.78rem;
            font-weight: 600;
        }

        #range-alert.show { display: block; }
        #range-alert.above { color: #ef4444; }
        #range-alert.below { color: #f59e0b; }

        /* ===== DRUG INFO ===== */
        #drug-info {
            margin-top: 1rem;
            background: var(--surface2);
            border-radius: var(--radius-sm);
            padding: 0.9rem 1rem;
            font-size: 0.85rem;
            color: var(--text-muted);
            text-align: center;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 0.3rem 0;
            border-bottom: 1px solid var(--border);
        }

        .info-row:last-child { border-bottom: none; }

        .info-key {
            font-weight: 600;
            color: var(--text-muted);
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            flex-shrink: 0;
            margin-right: 0.5rem;
        }

        .info-val {
            color: var(--text);
            font-size: 0.88rem;
            text-align: right;
        }

        /* ===== FOOTER ===== */
        footer {
            text-align: center;
            font-size: 0.72rem;
            color: var(--text-muted);
            line-height: 1.6;
        }

        footer strong { color: #f59e0b; }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
    </style>
</head>
<body>

<div class="app">

    <header>
        <h1>Perfusión <span>Pediátrica</span></h1>
        <p>Calculadora para perfusores de 50 ml</p>
    </header>

    <div class="card">

        <div class="field">
            <label for="weight">Peso del paciente</label>
            <div class="input-wrap">
                <input type="number" id="weight" placeholder="Ej: 12.5" min="0.5" max="120" step="0.1">
                <span class="unit-badge">kg</span>
            </div>
        </div>

        <div class="field">
            <label for="drug-search">Fármaco</label>
            <div class="autocomplete-wrap">
                <input type="text" id="drug-search" placeholder="Escriba para buscar..." autocomplete="off">
                <div id="drug-suggestions"></div>
            </div>
        </div>

        <div class="field">
            <label for="dose">Dosis deseada</label>
            <div class="input-wrap">
                <input type="number" id="dose" placeholder="Seleccione un fármaco" disabled min="0" step="any">
                <span id="dose-unit" class="unit-badge">—</span>
            </div>
        </div>

        <hr>

        <div id="result-box">
            <div class="result-label">Ritmo de perfusión</div>
            <div>
                <span class="result-value" id="result-val">—</span>
                <span class="result-unit">ml/h</span>
            </div>
            <div id="range-alert"></div>
        </div>

        <div id="drug-info">
            <span>Busque y seleccione un fármaco para ver la preparación.</span>
        </div>

    </div>

    <footer>
        <strong>⚠ Aviso:</strong> Herramienta de apoyo. No sustituye el juicio clínico.<br>
        Verifique siempre los cálculos y las diluciones antes de administrar.
    </footer>

</div>

        doseMin: 0.8, doseMax: 1.7

].sort((a, b) => a.name.localeCompare(b.name));

// ============================================================
//  FÓRMULAS
//  mcg/kg/min → (dose × peso × 60) / conc_mcg/ml
//  mcg/kg/h   → (dose × peso) / conc_mcg/ml
//  mg/kg/h    → (dose × peso × 1000) / conc_mcg/ml
//               si concUnit='mg/ml': (dose × peso) / conc_mg/ml
//  UI/kg/h    → (dose × peso) / conc_UI/ml
// ============================================================
function calcRate(drug, weight, dose) {
    const c = drug.concentration;
    switch (drug.doseUnit) {
        case 'mcg/kg/min': return (dose * weight * 60) / c;
        case 'mcg/kg/h':   return (dose * weight) / c;
        case 'mg/kg/h':
            return drug.concUnit === 'mg/ml'
                ? (dose * weight) / c
                : (dose * weight * 1000) / c;
        case 'UI/kg/h':    return (dose * weight) / c;
        default:           return 0;
    }
}

// ============================================================
//  DOM
// ============================================================
const weightInput    = document.getElementById('weight');
const drugSearchInput= document.getElementById('drug-search');
const suggestionsDiv = document.getElementById('drug-suggestions');
const doseInput      = document.getElementById('dose');
const doseUnitSpan   = document.getElementById('dose-unit');
const resultBox      = document.getElementById('result-box');
const resultVal      = document.getElementById('result-val');
const rangeAlert     = document.getElementById('range-alert');
const drugInfoDiv    = document.getElementById('drug-info');

let selectedDrug = null;

// ============================================================
//  AUTOCOMPLETE
// ============================================================
drugSearchInput.addEventListener('input', () => {
    const q = drugSearchInput.value.trim().toLowerCase();
    if (!q) { hideSuggestions(); resetDrug(); return; }

    const matches = drugs.filter(d =>
        d.name.toLowerCase().includes(q) ||
        d.trade.toLowerCase().includes(q)
    );

    if (!matches.length) { hideSuggestions(); return; }

    suggestionsDiv.innerHTML = '';
    matches.forEach(drug => {
        const item = document.createElement('div');
        item.className = 'suggestion-item';
        item.innerHTML = `${drug.name}<span class="suggestion-trade">${drug.trade}</span>`;
        item.addEventListener('click', () => selectDrug(drug));
        suggestionsDiv.appendChild(item);
    });
    suggestionsDiv.classList.add('open');
});

document.addEventListener('click', e => {
    if (!drugSearchInput.contains(e.target) && !suggestionsDiv.contains(e.target)) {
        hideSuggestions();
    }
});

function hideSuggestions() { suggestionsDiv.classList.remove('open'); }

function selectDrug(drug) {
    selectedDrug = drug;
    drugSearchInput.value = drug.name;
    hideSuggestions();

    doseInput.disabled = false;
    doseInput.value = '';
    doseInput.placeholder = `${drug.doseMin} – ${drug.doseMax}`;
    doseUnitSpan.textContent = drug.doseUnit;

    drugInfoDiv.innerHTML = `
        <div class="info-row">
            <span class="info-key">Nombre comercial</span>
            <span class="info-val">${drug.trade}</span>
        </div>
        <div class="info-row">
            <span class="info-key">Preparación</span>
            <span class="info-val">${drug.preparation}</span>
        </div>
        <div class="info-row">
            <span class="info-key">Concentración</span>
            <span class="info-val">${drug.concentration} ${drug.concUnit}</span>
        </div>
        <div class="info-row">
            <span class="info-key">Rango habitual</span>
            <span class="info-val">${drug.doseMin} – ${drug.doseMax} ${drug.doseUnit}</span>
        </div>
    `;

    calculate();
}

function resetDrug() {
    selectedDrug = null;
    doseInput.disabled = true;
    doseInput.value = '';
    doseInput.placeholder = 'Seleccione un fármaco';
    doseUnitSpan.textContent = '—';
    drugInfoDiv.innerHTML = '<span>Busque y seleccione un fármaco para ver la preparación.</span>';
    showNeutral();
}

// ============================================================
//  CÁLCULO
// ============================================================
function calculate() {
    if (!selectedDrug) { showNeutral(); return; }

    const weight = parseFloat(weightInput.value);
    const dose   = parseFloat(doseInput.value);

    if (isNaN(weight) || weight <= 0 || isNaN(dose) || dose < 0) {
        showNeutral(); return;
    }

    const rate = calcRate(selectedDrug, weight, dose);
    resultVal.textContent = rate.toFixed(2);

    const above = dose > selectedDrug.doseMax;
    const below = dose < selectedDrug.doseMin;

    if (above) {
        resultBox.className = 'danger';
        rangeAlert.className = 'show above';
        rangeAlert.textContent =
            `⚠ Dosis por encima del rango (máx. ${selectedDrug.doseMax} ${selectedDrug.doseUnit})`;
    } else if (below) {
        resultBox.className = 'warn';
        rangeAlert.className = 'show below';
        rangeAlert.textContent =
            `⚠ Dosis por debajo del rango (mín. ${selectedDrug.doseMin} ${selectedDrug.doseUnit})`;
    } else {
        resultBox.className = 'ok';
        rangeAlert.className = '';
        rangeAlert.textContent = '';
    }
}

function showNeutral() {
    resultVal.textContent = '—';
    resultBox.className = '';
    rangeAlert.className = '';
    rangeAlert.textContent = '';
}

weightInput.addEventListener('input', calculate);
doseInput.addEventListener('input', calculate);

// ============================================================
//  SERVICE WORKER
// ============================================================
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js')
            .then(r => console.log('[SW] registrado:', r.scope))
            .catch(e => console.warn('[SW] error:', e));
    });
}
</script>
